<!DOCTYPE html>
<html>
<head>
<title>Advanced Buffer Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root{
--bg1:#0f2027;
--bg2:#203a43;
--bg3:#2c5364;
--card:rgba(255,255,255,0.08);
--text:#ffffff;
--accent:#00ffd5;
}

/* FIX 1: Box-sizing prevents inputs from leaking out of the card */
*{ box-sizing: border-box; }

body{
margin:0;
font-family: 'Segoe UI', Roboto, sans-serif;
background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
color: var(--text);
overflow-x: hidden; /* Prevent horizontal scroll */
}

.wrapper{
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 15px; /* Reduced padding for mobile */
}

.card{
width: 100%;
max-width: 500px; /* Slimmer max-width for better mobile fit */
background: var(--card);
padding: 20px;
border-radius: 16px;
box-shadow: 0 20px 60px rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.1);
}

h2{
text-align: center;
margin-bottom: 20px;
font-size: 1.4rem;
color: var(--accent);
}

/* FIX 2: Inputs width & padding adjustment */
input, select{
width: 100%;
padding: 12px;
margin-bottom: 12px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.2);
background: rgba(255,255,255,0.05);
color: white;
outline: none;
display: block;
}

input:focus { border-color: var(--accent); }

button{
width: 100%;
padding: 14px;
border: none;
border-radius: 10px;
background: linear-gradient(180deg, #00ffd5, #00a8ff);
font-weight: bold;
color: #000;
cursor: pointer;
margin-top: 5px;
text-transform: uppercase;
}

.result{
margin-top: 20px;
font-size: 20px;
font-weight: bold;
color: var(--accent);
text-align: center;
display: none; /* Changed from opacity for better layout control */
}

.result.show{ display: block; }

.steps{
margin-top: 15px;
font-size: 12px;
line-height: 1.5;
white-space: pre-wrap;
background: rgba(0,0,0,0.4);
padding: 15px;
border-radius: 10px;
border-left: 3px solid var(--accent);
overflow-x: auto; /* Allow code scroll if too long */
}

/* FIX 3: Responsive Canvas */
.chart-container {
    position: relative;
    height: 250px;
    width: 100%;
    margin-top: 15px;
}

canvas{
    width: 100% !important;
    height: 100% !important;
}
    /* Header Styles - Matches index.html */
.navbar {
    background: rgba(15, 23, 42, 0.8) !important;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    height: 70px;
    display: flex;
    align-items: center;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    padding: 0 20px;
}

.brand-text {
    font-weight: 800;
    font-size: 1.2rem;
    background: linear-gradient(45deg, #007bff, #00ffd5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
}

/* Adjust wrapper to not hide under fixed header */
.wrapper, .container {
    margin-top: 80px !important;
}
</style>
</head>

<body>
    <nav class="navbar">
    <a class="brand-text" href="index.html">Chemistry Spark Lab</a>
</nav>
<div class="wrapper">
<div class="card">
<h2>Buffer Calculator</h2>

<input type="number" id="acidConc" placeholder="Weak Acid Concentration (M)">
<input type="number" id="baseConc" placeholder="Conjugate Base Concentration (M)">
<input type="number" id="pKa" placeholder="pKa Value">

<input type="number" id="addStrong" placeholder="Strong Acid/Base Added (moles)">
<select id="type">
<option value="acid">Add Strong Acid (H⁺)</option>
<option value="base">Add Strong Base (OH⁻)</option>
</select>

<input type="number" id="volume" placeholder="Total Volume (L)">
<button onclick="calculateBuffer()">Calculate pH</button>

<div id="result" class="result"></div>
<div id="steps" class="steps" style="display:none;"></div>

<div class="chart-container">
    <canvas id="graph"></canvas>
</div>

</div>
</div>

<script>
let chart=null;

function calculateBuffer(){
    let HA=parseFloat(document.getElementById("acidConc").value);
    let A=parseFloat(document.getElementById("baseConc").value);
    let pKa=parseFloat(document.getElementById("pKa").value);
    let added=parseFloat(document.getElementById("addStrong").value)||0;
    let type=document.getElementById("type").value;
    let V=parseFloat(document.getElementById("volume").value);

    if(!HA||!A||isNaN(pKa)||!V){
        alert("Please fill in all required chemistry values");
        return;
    }

    let Ka=Math.pow(10,-pKa);
    let steps="Initial Buffer Details:\n";
    let initialPH = pKa + Math.log10(A/HA);
    steps += "Initial pH: " + initialPH.toFixed(3) + "\n";

    let molesHA = HA * V;
    let molesA = A * V;

    if(type === "acid"){
        molesA -= added;
        molesHA += added;
        steps += "Reaction: A⁻ + H⁺ → HA\n";
    } else {
        molesA += added;
        molesHA -= added;
        steps += "Reaction: HA + OH⁻ → A⁻ + H₂O\n";
    }

    if(molesA <= 0 || molesHA <= 0){
        alert("Buffer Destroyed! Added amount exceeds capacity.");
        return;
    }

    let newPH = pKa + Math.log10(molesA/molesHA);
    steps += "Final pH: " + newPH.toFixed(3);

    // Henderson-Hasselbalch Logic
    document.getElementById("steps").innerText = steps;
    document.getElementById("steps").style.display = "block";

    let res = document.getElementById("result");
    res.innerHTML = "Final pH: " + newPH.toFixed(3);
    res.classList.add("show");

    drawGraph(pKa, initialPH, newPH);
}

function drawGraph(pKa, initial, final){
    let ctx = document.getElementById("graph").getContext("2d");
    if(chart){ chart.destroy(); }

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: ["Start", "Process", "Finish"],
            datasets: [{
                label: "pH Gradient",
                data: [initial, (initial + final)/2, final],
                borderColor: "#00ffd5",
                backgroundColor: "rgba(0, 255, 213, 0.1)",
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: "#ccc" } },
                y: { ticks: { color: "#ccc" }, min: 0, max: 14 }
            }
        }
    });
}
</script>

    <div id="footer-container"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer-container").innerHTML = data;
});
</script>
</body>
</html>
