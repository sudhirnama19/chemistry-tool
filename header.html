<script>
  
  /* Glass Header */

.glass-header{
position:sticky;
top:0;
z-index:1000;

background: rgba(255,255,255,0.15);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);

border-bottom:1px solid rgba(255,255,255,0.2);
box-shadow:0 8px 32px rgba(0,0,0,0.1);
}

/* Container */

.nav-container{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
}

/* Logo */

.logo a{
font-size:22px;

color:#111;
}

/* Menu */

.nav-links{
display:flex;
gap:28px;
list-style:none;
align-items:center;
}

.nav-links a{
text-decoration:none;
font-weight:600;
color:#222;
font-size:16px;
transition:0.3s;
}

/* Hover animation */

.nav-links a:hover{
color:#0077ff;
transform:translateY(-2px);
}

/* Dropdown */

.dropdown{
position:relative;
}

.dropdown-menu{
position:absolute;
top:40px;
left:0;

background:rgba(255,255,255,0.8);
backdrop-filter: blur(10px);

border-radius:10px;
padding:10px 0;
list-style:none;

display:none;
min-width:200px;

box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.dropdown-menu li{
padding:8px 20px;
}

.dropdown-menu a{
color:#222;
font-size:15px;
}

.dropdown:hover .dropdown-menu{
display:block;
}

/* Mobile */

@media(max-width:768px){

.nav-links{
gap:18px;
font-size:14px;
}

.logo a{
font-size:18px;
}

}
