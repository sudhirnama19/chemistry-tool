name: Inject Protection
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Script
        run: python inject_protection.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          git diff --cached --quiet || git commit -m "Injected protect.js"
          git push
