
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normality Pro Suite | Chemistry Spark Lab</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --accent: #00ffd5; --bg: #0f172a; --card: #1e293b; --tab-bg: #334155; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 30px; }
        
        .main-header { padding: 15px; background: #1e293b; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .main-header a { text-decoration: none; color: var(--accent); font-size: 1.3rem; font-weight: 800; }

        /* SCROLLABLE PILL TABS */
        .tab-wrapper {
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 10px;
            padding: 15px 10px;
            -webkit-overflow-scrolling: touch;
        }
        .tab-wrapper::-webkit-scrollbar { display: none; }

        .calc-tab {
            background: var(--tab-bg);
            color: #cbd5e1;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .calc-tab.active { background: var(--accent); color: #0f172a; box-shadow: 0 4px 12px rgba(0,255,213,0.3); }

        .content-section { max-width: 600px; margin: auto; padding: 15px; }
        .solver-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        
        .form-label { color: var(--accent); font-weight: 600; margin-top: 12px; font-size: 0.85rem; }
        .form-control {
            background-color: #0f172a !important;
            color: #ffffff !important;
            border: 1px solid #475569 !important;
            padding: 12px;
            border-radius: 10px;
        }

        .btn-solve {
            background: linear-gradient(135deg, #007bff, var(--accent));
            color: #0f172a; font-weight: 800; width: 100%; padding: 14px;
            border-radius: 12px; border: none; margin-top: 20px;
        }

        .result-box {
            display: none; margin-top: 20px; padding: 15px;
            background: rgba(0,255,213,0.1); border-radius: 12px; border-left: 4px solid var(--accent);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
    </style>
</head>
<body>

    <header class="main-header"><a href="index.html">CHEMISTRY SPARK LAB</a></header>

    <div class="tab-wrapper">
        <button class="calc-tab active" onclick="showCalc('gen', this)">General $N$</button>
        <button class="calc-tab" onclick="showCalc('mol', this)">$M \to N$</button>
        <button class="calc-tab" onclick="showCalc('tit', this)">Acid-Base ($N_1V_1$)</button>
        <button class="calc-tab" onclick="showCalc('dil', this)">Dilution</button>
        <button class="calc-tab" onclick="showCalc('mix', this)">Mixing ($N_R$)</button>
    </div>

    <div class="content-section">
        
        <div id="gen" class="tab-panel active">
            <div class="solver-card">
                <h5 class="text-center">Weight / Eq. Weight</h5>
                <label class="form-label">Weight of Solute (g)</label>
                <input type="text" id="w_g" class="form-control" placeholder="e.g. 4.9">
                <label class="form-label">Equivalent Weight</label>
                <input type="text" id="eq_w" class="form-control" placeholder="e.g. 49">
                <label class="form-label">Volume (L)</label>
                <input type="text" id="v_l" class="form-control" placeholder="0.5">
                <button onclick="calcGen()" class="btn-solve">Calculate $N$</button>
                <div id="res_gen" class="result-box"></div>
            </div>
        </div>

        <div id="mol" class="tab-panel">
            <div class="solver-card">
                <h5 class="text-center">$N = M \times \text{n-factor}$</h5>
                <label class="form-label">Molarity (M)</label>
                <input type="text" id="m_val" class="form-control">
                <label class="form-label">n-factor (Acidity/Basicity)</label>
                <input type="text" id="nf_val" class="form-control">
                <button onclick="calcMol()" class="btn-solve">Convert to $N$</button>
                <div id="res_mol" class="result-box"></div>
            </div>
        </div>

        <div id="tit" class="tab-panel">
            <div class="solver-card">
                <h5 class="text-center">Acid-Base Titration</h5>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">$N_{acid}$</label><input type="text" id="na" class="form-control"></div>
                    <div class="col-6"><label class="form-label">$V_{acid}$</label><input type="text" id="va" class="form-control"></div>
                    <div class="col-6"><label class="form-label">$N_{base}$</label><input type="text" id="nb" class="form-control"></div>
                    <div class="col-6"><label class="form-label">$V_{base}$</label><input type="text" id="vb" class="form-control"></div>
                </div>
                <button onclick="calcTit()" class="btn-solve">Solve Titration</button>
                <div id="res_tit" class="result-box"></div>
            </div>
        </div>

        <div id="dil" class="tab-panel">
            <div class="solver-card">
                <h5 class="text-center">Dilution ($N_1V_1 = N_2V_2$)</h5>
                <div class="row g-2">
                    <div class="col-6"><label class="form-label">$N_1$</label><input type="text" id="n1" class="form-control"></div>
                    <div class="col-6"><label class="form-label">$V_1$</label><input type="text" id="v1" class="form-control"></div>
                    <div class="col-6"><label class="form-label">$N_2$</label><input type="text" id="n2" class="form-control"></div>
                    <div class="col-6"><label class="form-label">$V_2$</label><input type="text" id="v2" class="form-control"></div>
                </div>
                <button onclick="calcDil()" class="btn-solve">Solve Dilution</button>
                <div id="res_dil" class="result-box"></div>
            </div>
        </div>

        <div id="mix" class="tab-panel">
            <div class="solver-card">
                <h5 class="text-center">Resultant Normality ($N_R$)</h5>
                <div id="mix-inputs">
                    <div class="row g-2 mb-2">
                        <div class="col-6"><input type="text" class="form-control mn" placeholder="Normality"></div>
                        <div class="col-6"><input type="text" class="form-control mv" placeholder="Volume (mL)"></div>
                    </div>
                </div>
                <button class="btn btn-outline-info btn-sm w-100 mt-2" onclick="addMix()">+ Add Solution</button>
                <button onclick="calcMix()" class="btn-solve">Calculate $N_R$</button>
                <div id="res_mix" class="result-box"></div>
            </div>
        </div>

    </div>

    <script>
        function smartParser(v) {
            if (!v || v.trim()==="") return NaN;
            let s = v.toLowerCase().replace(/x/g, '*').replace(/\^/g, '**');
            try { return Function('"use strict"; return (' + s + ')')(); } catch(e) { return NaN; }
        }

        function showCalc(id, btn) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.calc-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(window.MathJax) MathJax.typeset();
        }

        // Logic for Formula: N = Weight / (EqW * V)
        function calcGen() {
            let w = smartParser(document.getElementById('w_g').value);
            let eq = smartParser(document.getElementById('eq_w').value);
            let v = smartParser(document.getElementById('v_l').value);
            let res = w / (eq * v);
            document.getElementById('res_gen').innerHTML = `<strong>Normality:</strong> ${res.toFixed(5)} N`;
            document.getElementById('res_gen').style.display = "block";
        }

        // Logic for Formula: N = M * n-factor
        function calcMol() {
            let m = smartParser(document.getElementById('m_val').value);
            let nf = smartParser(document.getElementById('nf_val').value);
            document.getElementById('res_mol').innerHTML = `<strong>Normality:</strong> ${(m * nf).toFixed(5)} N`;
            document.getElementById('res_mol').style.display = "block";
        }

        // Titration Solver
        function calcTit() {
            let na = smartParser(document.getElementById('na').value);
            let va = smartParser(document.getElementById('va').value);
            let nb = smartParser(document.getElementById('nb').value);
            let vb = smartParser(document.getElementById('vb').value);
            let ans = "";
            if (isNaN(na)) ans = "Acid Normality: " + (nb * vb / va).toFixed(4);
            else if (isNaN(va)) ans = "Acid Volume: " + (nb * vb / na).toFixed(4);
            else if (isNaN(nb)) ans = "Base Normality: " + (na * va / vb).toFixed(4);
            else if (isNaN(vb)) ans = "Base Volume: " + (na * va / nb).toFixed(4);
            document.getElementById('res_tit').innerText = ans;
            document.getElementById('res_tit').style.display = "block";
        }

        // Dilution Solver
        function calcDil() {
            let n1 = smartParser(document.getElementById('n1').value);
            let v1 = smartParser(document.getElementById('v1').value);
            let n2 = smartParser(document.getElementById('n2').value);
            let v2 = smartParser(document.getElementById('v2').value);
            let ans = "";
            if (isNaN(n1)) ans = "N1: " + (n2 * v2 / v1).toFixed(4);
            else if (isNaN(v1)) ans = "V1: " + (n2 * v2 / n1).toFixed(4);
            else if (isNaN(n2)) ans = "N2: " + (n1 * v1 / v2).toFixed(4);
            else if (isNaN(v2)) ans = "V2: " + (n1 * v1 / n2).toFixed(4);
            document.getElementById('res_dil').innerText = ans;
            document.getElementById('res_dil').style.display = "block";
        }

        function addMix() {
            let d = document.createElement('div');
            d.className = "row g-2 mb-2";
            d.innerHTML = `<div class="col-6"><input type="text" class="form-control mn" placeholder="N"></div>
                           <div class="col-6"><input type="text" class="form-control mv" placeholder="Vol (mL)"></div>`;
            document.getElementById('mix-inputs').appendChild(d);
        }

        // Formula: NR = (N1V1 + N2V2...) / (V1 + V2...)
        function calcMix() {
            let ns = document.getElementsByClassName('mn');
            let vs = document.getElementsByClassName('mv');
            let sumNV = 0, sumV = 0;
            for(let i=0; i<ns.length; i++){
                let n = smartParser(ns[i].value);
                let v = smartParser(vs[i].value);
                if(!isNaN(n) && !isNaN(v)){ sumNV += (n*v); sumV += v; }
            }
            document.getElementById('res_mix').innerHTML = `<strong>Resultant $N_R$:</strong> ${(sumNV/sumV).toFixed(5)} N`;
            document.getElementById('res_mix').style.display = "block";
            MathJax.typeset();
        }
    </script>
</body>
</html>
