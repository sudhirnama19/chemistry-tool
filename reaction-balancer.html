
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Reaction Matrix Solver | Chemistry Spark</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --accent: #00ffd5; --bg: #0b0f1a; --glass: rgba(30, 41, 59, 0.7); --border: rgba(255, 255, 255, 0.1); }
        body { background: radial-gradient(circle at top right, #1e293b, #0b0f1a); color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border-radius: 20px; padding: 30px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .h-accent { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .form-control-custom { background: #161b22; color: #fff; border: 1px solid #334155; border-radius: 10px; padding: 15px; font-size: 1.1rem; }
        .btn-solve { background: linear-gradient(135deg, #0ea5e9, var(--accent)); color: #0b0f1a; border: none; font-weight: 800; padding: 15px; border-radius: 10px; transition: 0.3s; width: 100%; }
        .btn-solve:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 255, 213, 0.4); }
        .result-panel { display: none; margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
        .badge-logic { background: rgba(0, 255, 213, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass-card">
                <h3 class="h-accent text-center mb-4">Ultra Pro Reaction Balancer</h3>
                
                <div class="mb-4">
                    <label class="form-label small text-secondary">Enter Equation (e.g., KMnO4 + HCl = KCl + MnCl2 + H2O + Cl2)</label>
                    <input type="text" id="equationInput" class="form-control-custom w-100" placeholder="CH4 + O2 = CO2 + H2O">
                </div>

                <button onclick="processReaction()" class="btn-solve">
                    <i class="fa-solid fa-wand-magic-sparkles me-2"></i> BALANCE VIA MATRIX ALGEBRA
                </button>

                <div id="resultArea" class="result-panel">
                    <div id="correctionAlert"></div>
                    <h5 class="text-white fw-bold">Balanced Equation:</h5>
                    <div id="equationOutput" class="h4 text-accent my-3"></div>
                    
                    <div class="mt-4">
                        <h6 class="text-secondary text-uppercase small">Mathematical Derivation</h6>
                        <div id="stepLogic" class="small text-white-50 mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * Smart Parser for numeric and scientific inputs
 * Integrated as requested for Sudhir Nama's tools
 */
function smartParser(input) {
    if (typeof input !== 'string') return input;
    let sanitized = input.replace(/x/g, '*').replace(/\^/g, '**');
    try {
        return eval(sanitized); 
    } catch (e) {
        return parseFloat(input);
    }
}

/**
 * RECURSIVE FORMULA PARSER
 * Handles nested parentheses: Mg3(PO4)2, [Fe(CN)6]4-, etc.
 */
function parseFormula(formula) {
    let counts = {};
    let stack = [{}];
    let i = 0;

    while (i < formula.length) {
        let char = formula[i];
        if (char === '(' || char === '[' || char === '{') {
            stack.push({});
            i++;
        } else if (char === ')' || char === ']' || char === '}') {
            let top = stack.pop();
            i++;
            let start = i;
            while (i < formula.length && /\d/.test(formula[i])) i++;
            let multiplier = parseInt(formula.substring(start, i) || "1");
            for (let el in top) {
                stack[stack.length - 1][el] = (stack[stack.length - 1][el] || 0) + top[el] * multiplier;
            }
        } else {
            let match = formula.substring(i).match(/^([A-Z][a-z]*)(\d*)/);
            if (match) {
                let el = match[1];
                let count = parseInt(match[2] || "1");
                stack[stack.length - 1][el] = (stack[stack.length - 1][el] || 0) + count;
                i += match[0].length;
            } else { i++; }
        }
    }
    return stack[0];
}

/**
 * GAUSSIAN ELIMINATION SOLVER
 */
function solveMatrix(matrix) {
    let rows = matrix.length;
    let cols = matrix[0].length;
    
    for (let i = 0; i < Math.min(rows, cols); i++) {
        let pivot = i;
        while (pivot < rows && Math.abs(matrix[pivot][i]) < 1e-10) pivot++;
        if (pivot === rows) continue;
        [matrix[i], matrix[pivot]] = [matrix[pivot], matrix[i]];

        for (let j = i + 1; j < rows; j++) {
            let factor = matrix[j][i] / matrix[i][i];
            for (let k = i; k < cols; k++) matrix[j][k] -= factor * matrix[i][k];
        }
    }

    // Back substitution for the null space
    let sol = new Array(cols).fill(1);
    for (let i = rows - 1; i >= 0; i--) {
        let sum = 0;
        let pivotCol = -1;
        for (let j = 0; j < cols; j++) {
            if (Math.abs(matrix[i][j]) > 1e-10) {
                if (pivotCol === -1) pivotCol = j;
                else sum += matrix[i][j] * sol[j];
            }
        }
        if (pivotCol !== -1) sol[pivotCol] = -sum / matrix[i][pivotCol];
    }

    // Convert to smallest integers
    for (let q = 1; q < 1000; q++) {
        let test = sol.map(x => Math.round(x * q * 100000) / 100000);
        if (test.every(x => Math.abs(x - Math.round(x)) < 1e-4 && Math.round(x) > 0)) {
            return test.map(x => Math.round(x));
        }
    }
    return sol.map(x => Math.round(x));
}

function processReaction() {
    let input = document.getElementById('equationInput').value.trim();
    if (!input) return;

    // AUTO-CORRECTION LOGIC
    input = input.replace(/H20/g, 'H2O'); // Common typo correction
    
    // Split into reactants and products
    let sides = input.split(/[=→]/);
    if (sides.length !== 2) return alert("Use '=' or '->' to separate sides.");

    let left = sides[0].split('+').map(s => s.trim());
    let right = sides[1].split('+').map(s => s.trim());
    let allParts = [...left, ...right];

    // Build Element List
    let elements = new Set();
    allParts.forEach(comp => {
        let p = parseFormula(comp);
        Object.keys(p).forEach(el => elements.add(el));
    });
    let elArray = Array.from(elements);

    // Build Matrix: Rows = Elements, Cols = Compounds
    let matrix = elArray.map(el => {
        return allParts.map((comp, idx) => {
            let p = parseFormula(comp);
            let count = p[el] || 0;
            return idx < left.length ? count : -count;
        });
    });

    try {
        let coeffs = solveMatrix(matrix);
        
        // Construct final string
        let resLeft = left.map((c, i) => (coeffs[i] === 1 ? "" : coeffs[i]) + c).join(" + ");
        let resRight = right.map((c, i) => (coeffs[i + left.length] === 1 ? "" : coeffs[i + left.length]) + c).join(" + ");
        
        document.getElementById('equationOutput').innerText = resLeft + " → " + resRight;
        document.getElementById('stepLogic').innerHTML = `
            <div class="mb-2"><span class="badge-logic">Matrix Solver</span> Built ${elArray.length}x${allParts.length} conservation matrix.</div>
            <div class="mb-2"><span class="badge-logic">Gaussian Elimination</span> Calculated null space for atomic constraints.</div>
            <div class="mb-2"><span class="badge-logic">Integer Optimization</span> Found smallest whole-number coefficients.</div>
        `;
        document.getElementById('resultArea').style.display = "block";
    } catch (e) {
        alert("Reaction could not be balanced. Ensure all elements on the left exist on the right.");
    }
}
</script>

</body>
</html>
