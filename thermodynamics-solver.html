
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Spark Lab | Ultra Solver</title>
    
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root { --accent: #00ffd5; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: #fff; padding: 15px; font-family: sans-serif; }
        .solver-card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Visibility Fix: Ensuring text inside boxes is white */
        .form-label { color: var(--accent); font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
        .form-control { 
            background: #0f172a !important; 
            color: #ffffff !important; 
            border: 1px solid #334155 !important; 
            font-weight: 500;
        }
        
        .btn-analyze { 
            background: linear-gradient(45deg, #007bff, var(--accent)); 
            border: none; color: #0f172a; font-weight: 800; padding: 12px; width: 100%; border-radius: 8px; margin-top: 15px;
        }

        .result-box { 
            display: none; margin-top: 20px; padding: 15px; border-radius: 10px; 
            background: rgba(0,0,0,0.3); border-left: 4px solid var(--accent); 
        }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="solver-card mx-auto" style="max-width: 450px;">
        <h5 class="text-center mb-4" style="color: var(--accent);">Ultra Thermodynamics Solver</h5>
        
        <div class="row g-2">
            <div class="col-12"><label class="form-label">Moles ($n$)</label><input type="number" id="n" class="form-control" value="1"></div>
            <div class="col-6"><label class="form-label">$T_1$ (K)</label><input type="number" id="t1" class="form-control" value="298"></div>
            <div class="col-6"><label class="form-label">$T_2$ (K)</label><input type="number" id="t2" class="form-control" value="400"></div>
            <div class="col-6"><label class="form-label">$V_1$ (L)</label><input type="number" id="v1" class="form-control" value="22.4"></div>
            <div class="col-6"><label class="form-label">$V_2$ (L)</label><input type="number" id="v2" class="form-control" value="44.8"></div>
            <div class="col-12"><label class="form-label">Polytropic Index ($x$)</label><input type="number" id="poly_x" class="form-control" value="1.4"></div>
            <div class="col-6"><label class="form-label">$C_v$ Const ($a$)</label><input type="number" id="cv_a" class="form-control" value="12.47"></div>
            <div class="col-6"><label class="form-label">$C_v$ Slope ($b$)</label><input type="number" id="cv_b" class="form-control" value="0"></div>
        </div>

        <button id="analyze-btn" class="btn btn-analyze">ANALYZE PROCESS</button>

        <div id="result-area" class="result-box">
            <div class="res-row"><span>$\Delta U$:</span><b id="res_u"></b></div>
            <div class="res-row"><span>Work ($W$):</span><b id="res_w"></b></div>
            <div class="res-row"><span>$\Delta H$:</span><b id="res_h"></b></div>
            <div class="res-row"><span>$\Delta S$:</span><b id="res_s"></b></div>
            <div class="res-row"><span>$\Delta G$:</span><b id="res_g"></b></div>
            <hr class="my-2 border-secondary">
            <div class="text-center"><small id="res_spont" style="color: var(--accent); font-weight: bold;"></small></div>
        </div>
    </div>
</div>

<script src="js/thermodynamics-solver.js"></script>

    <div id="footer-container"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer-container").innerHTML = data;
});
</script>
    
</body>
</html>
