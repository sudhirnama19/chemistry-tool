<script>
    /** * THE UNIVERSAL INTERCEPTOR 
     * This makes every "parseFloat" in your calculators understand 10^-20
     */
    (function() {
        // Step 1: Create the Smart Parser
        window.smartParse = function(val) {
            if (!val || val.toString().trim() === "") return NaN;
            let str = val.toString().toLowerCase().replace(/\s/g, "");
            
            // Handle 10^-5 or 2^10 formats
            if (str.includes("^")) {
                let parts = str.split("^");
                return Math.pow(parseFloat(parts[0]), parseFloat(parts[1]));
            }
            return parseFloat(str);
        };

        // Step 2: Fix UI - Unlock mobile keyboards for all calculators
        function unlockInputs() {
            document.querySelectorAll('input[type="number"]').forEach(input => {
                input.type = "text"; 
                input.inputMode = "decimal";
                if (!input.placeholder.includes("^")) {
                    input.placeholder += " (e.g. 1e-5 or 10^-14)";
                }
            });
        }

        // Run UI fix on load
        window.addEventListener('DOMContentLoaded', unlockInputs);
        setTimeout(unlockInputs, 500); // Backup for slow loading
    })();
</script>
