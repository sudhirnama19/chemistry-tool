
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Research Lab Titration Simulator 2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Global Fix: Prevents elements from leaking out of layout */
*{ box-sizing: border-box; }

body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:15px; /* Reduced padding for mobile */
    overflow-x: hidden;
}

.container{
    max-width:1100px;
    margin:auto;
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h2{ text-align:center; margin-bottom:20px; font-size: 1.5rem; }

.grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px;
}

label { display: block; margin-top: 10px; font-size: 0.9rem; color: #00ffd5; }

input, select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border: 1px solid rgba(255,255,255,0.2);
    margin:5px 0;
    background: rgba(0,0,0,0.3);
    color: white;
}

.slider{ width:100%; cursor: pointer; }

.result{
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0,0,0,0.4);
    border-left: 4px solid #00ffd5;
    font-size: 0.95rem;
    line-height: 1.6;
}

/* FIX: Responsive Graph Layout */
.graph-wrapper {
    width: 100%;
    background: white;
    border-radius: 15px;
    margin-top: 25px;
    overflow: hidden; /* Clips the canvas to radius */
}

canvas{
    display: block;
    width: 100% !important; /* Forces canvas to stay inside wrapper */
    height: auto !important; /* Maintains aspect ratio */
}

@media(max-width:800px){
    .grid{ grid-template-columns: 1fr; }
    h2 { font-size: 1.2rem; }
}
    /* Header Styles - Matches index.html */
.navbar {
    background: rgba(15, 23, 42, 0.8) !important;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    height: 70px;
    display: flex;
    align-items: center;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    padding: 0 20px;
}

.brand-text {
    font-weight: 800;
    font-size: 1.2rem;
    background: linear-gradient(45deg, #007bff, #00ffd5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
}

/* Adjust wrapper to not hide under fixed header */
.wrapper, .container {
    margin-top: 80px !important;
}
</style>
</head>
<body>
    <nav class="navbar">
    <a class="brand-text" href="index.html">Chemistry Spark Lab</a>
</nav>

<div class="container">
    <h2>🧪 Titration Simulator 2.0</h2>

    <div class="grid">
        <div>
            <label>Mode</label>
            <select id="mode">
                <option value="ph">pH Titration</option>
                <option value="cond">Conductometric</option>
            </select>

            <label>Acid Type</label>
            <select id="acidType">
                <option value="mono">Monoprotic</option>
                <option value="di">Diprotic (H₂A)</option>
            </select>

            <label>Acid Concentration (M)</label>
            <input type="number" id="Ca" value="0.1" step="0.01">

            <label>Acid Volume (mL)</label>
            <input type="number" id="Va" value="50">

            <label>Base Concentration (M)</label>
            <input type="number" id="Cb" value="0.1" step="0.01">

            <label>Ka₁</label>
            <input type="number" id="Ka1" value="0.00001">

            <label>Ka₂ (if diprotic)</label>
            <input type="number" id="Ka2" value="0.000000001">

            <label>Added Base Volume: <span id="displayV" style="color:#00ffd5">0 mL</span></label>
            <input type="range" min="0" max="150" step="0.5" id="Vb" class="slider" oninput="update()">
        </div>

        <div>
            <div class="result" id="result">
                Calculations will appear here...
            </div>
        </div>
    </div>

    <div class="graph-wrapper">
        <canvas id="graph" width="1000" height="400"></canvas>
    </div>
</div>

<script>
function update() {
    let acidType = document.getElementById("acidType").value;
    let Ca = parseFloat(document.getElementById("Ca").value);
    let Va = parseFloat(document.getElementById("Va").value) / 1000;
    let Cb = parseFloat(document.getElementById("Cb").value);
    let Ka1 = parseFloat(document.getElementById("Ka1").value);
    let Ka2 = parseFloat(document.getElementById("Ka2").value);
    let Vb_val = parseFloat(document.getElementById("Vb").value) / 1000;

    document.getElementById("displayV").innerText = (Vb_val * 1000).toFixed(1) + " mL";

    let molesA = Ca * Va;
    let molesB = Cb * Vb_val;
    let totalVol = Va + Vb_val;
    let pH = 7;
    let Veq1 = molesA / Cb;
    let Veq2 = (acidType == "di") ? 2 * molesA / Cb : Veq1;

    // Simplified pH Logic
    if (acidType == "mono") {
        if (Vb_val < Veq1) {
            let ratio = molesB / (molesA - molesB);
            pH = -Math.log10(Ka1) + Math.log10(ratio || 0.000001);
        } else {
            let excess = (molesB - molesA) / totalVol;
            pH = 14 + Math.log10(excess || 0.000001);
        }
    } else {
        if (Vb_val < Veq1) {
            let ratio = molesB / (molesA - molesB);
            pH = -Math.log10(Ka1) + Math.log10(ratio || 0.000001);
        } else if (Vb_val < Veq2) {
            let ratio = (molesB - molesA) / (2 * molesA - molesB);
            pH = -Math.log10(Ka2) + Math.log10(ratio || 0.000001);
        } else {
            let excess = (molesB - 2 * molesA) / totalVol;
            pH = 14 + Math.log10(excess || 0.000001);
        }
    }

    pH = Math.max(0, Math.min(14, pH));

    document.getElementById("result").innerHTML = 
        "<b>Current pH:</b> " + pH.toFixed(3) + "<br>" +
        "<b>Equivalence Point 1:</b> " + (Veq1 * 1000).toFixed(2) + " mL<br>" +
        (acidType == "di" ? "<b>Equivalence Point 2:</b> " + (Veq2 * 1000).toFixed(2) + " mL" : "");

    drawGraph(acidType, Ca, Va, Cb, Ka1, Ka2);
}

function drawGraph(acidType, Ca, Va, Cb, Ka1, Ka2) {
    let canvas = document.getElementById("graph");
    let ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Grid
    ctx.strokeStyle = "#eee";
    ctx.lineWidth = 1;
    for(let i=0; i<=14; i++) {
        let y = canvas.height - (i/14) * canvas.height;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    ctx.beginPath();
    ctx.strokeStyle = "#007bff";
    ctx.lineWidth = 4;

    let molesA = Ca * Va;
    let limit = (acidType == "di") ? (2 * molesA / Cb) * 1.5 : (molesA / Cb) * 1.5;

    for (let v = 0; v <= limit; v += limit / 100) {
        let volB = v;
        let p = 7;
        let vEq1 = molesA / Cb;
        let vEq2 = (acidType == "di") ? 2 * molesA / Cb : vEq1;

        if (acidType == "mono") {
            if (volB < vEq1) p = -Math.log10(Ka1) + Math.log10((Cb * volB) / (molesA - Cb * volB) || 0.0001);
            else p = 14 + Math.log10((Cb * volB - molesA) / (Va + volB) || 0.0001);
        } else {
            if (volB < vEq1) p = -Math.log10(Ka1) + Math.log10((Cb * volB) / (molesA - Cb * volB) || 0.0001);
            else if (volB < vEq2) p = -Math.log10(Ka2) + Math.log10((Cb * volB - molesA) / (2 * molesA - Cb * volB) || 0.0001);
            else p = 14 + Math.log10((Cb * volB - 2 * molesA) / (Va + volB) || 0.0001);
        }

        p = Math.max(0, Math.min(14, p));
        let x = (v / limit) * canvas.width;
        let y = canvas.height - (p / 14) * canvas.height;

        if (v == 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

// Initial Call
update();
</script>

    <div id="footer-container"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer-container").innerHTML = data;
});
</script>
</body>
</html>
