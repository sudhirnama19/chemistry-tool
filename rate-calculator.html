<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Rate Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-cyan: #00ffd5;
            --accent-blue: #007bff;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding-top: 90px;
        }

        /* Glassmorphism Header */
        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 70px;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            display: flex; align-items: center; padding: 0 20px;
        }

        .brand-text {
            font-weight: 800; font-size: 1.2rem;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .calc-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .form-label { color: var(--accent-cyan); font-weight: 600; font-size: 0.9rem; }
        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* High-Visibility Stat Cards */
.stat-card {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    border-top: 3px solid var(--accent-cyan);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

/* Force Labels to be light grey/white */
.stat-card small, 
.stat-card .text-muted {
    color: rgba(255, 255, 255, 0.8) !important; /* Force light visibility */
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Force Values (Numbers/Infinite) to be pure white */
.stat-card h4 {
    color: #ffffff !important;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0, 255, 213, 0.3); /* Subtle glow */
}

        .chart-container {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }

        .btn-calc {
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-cyan));
            border: none; font-weight: 700; color: white;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="brand-text">Chemistry Spark Lab</a>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="calc-card">
                    <h3 class="mb-4">Kinetics Solver</h3>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Order of Reaction</label>
                            <select id="order" class="form-select">
                                <option value="0">Zero Order ( [A] = [A]₀ - kt )</option>
                                <option value="1">First Order ( ln[A] = ln[A]₀ - kt )</option>
                                <option value="2">Second Order ( 1/[A] = 1/[A]₀ + kt )</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Initial Conc. [A]₀ (M)</label>
                            <input type="number" id="a0" class="form-control" value="1.0">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Rate Constant (k)</label>
                            <input type="number" id="k_const" class="form-control" value="0.05">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Specific Time (s) for Status</label>
                            <input type="number" id="target_t" class="form-control" value="10">
                        </div>
                        <div class="col-12 mt-4">
                            <button onclick="simulateKinetics()" class="btn btn-calc w-100 py-3">RUN SIMULATION</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="calc-card">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="stat-card">
                                <small class="text-muted">Half-Life (t₁/₂)</small>
                                <h4 id="t_half" class="mb-0 text-white">-</h4>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-card">
                                <small class="text-muted">Completion Time</small>
                                <h4 id="t_comp" class="mb-0 text-white">-</h4>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-card">
                                <small class="text-muted">Completed %</small>
                                <h4 id="perc_comp" class="mb-0 text-white">-</h4>
                            </div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="kineticsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        function simulateKinetics() {
            const order = parseInt(document.getElementById('order').value);
            const a0 = parseFloat(document.getElementById('a0').value);
            const k = parseFloat(document.getElementById('k_const').value);
            const targetT = parseFloat(document.getElementById('target_t').value);

            // 1. Core Calculations
            let tHalf, tComplete, at;
            
            if (order === 0) {
                tHalf = a0 / (2 * k);
                tComplete = a0 / k;
                at = Math.max(0, a0 - (k * targetT));
            } else if (order === 1) {
                tHalf = 0.693 / k;
                tComplete = "∞ (Asymptotic)";
                at = a0 * Math.exp(-k * targetT);
            } else {
                tHalf = 1 / (k * a0);
                tComplete = "∞ (Asymptotic)";
                at = 1 / ((1 / a0) + (k * targetT));
            }

            // 2. Completion Metrics
            const percComp = ((a0 - at) / a0) * 100;
            const remaining = 100 - percComp;

            document.getElementById('t_half').innerText = tHalf.toFixed(2) + "s";
            document.getElementById('t_comp').innerText = typeof tComplete === 'number' ? tComplete.toFixed(2) + "s" : "Infinite";
            document.getElementById('perc_comp').innerText = percComp.toFixed(1) + "%";

            // 3. Graph Data Generation
            const labels = [];
            const data = [];
            const maxTime = typeof tComplete === 'number' ? tComplete * 1.2 : tHalf * 5;
            
            for (let i = 0; i <= 20; i++) {
                let time = (maxTime / 20) * i;
                let conc;
                if (order === 0) conc = Math.max(0, a0 - (k * time));
                else if (order === 1) conc = a0 * Math.exp(-k * time);
                else conc = 1 / ((1 / a0) + (k * time));
                
                labels.push(time.toFixed(1));
                data.push(conc.toFixed(3));
            }

            // 4. Render Chart
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('kineticsChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Concentration [A] over Time',
                        data: data,
                        borderColor: '#00ffd5',
                        backgroundColor: 'rgba(0, 255, 213, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { title: { display: true, text: 'Concentration (M)', color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { title: { display: true, text: 'Time (s)', color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        }

        // Run on load
        window.onload = simulateKinetics;
    </script>

    <div id="footer-container"></div>

<script>
fetch("footer.html")
.then(res => res.text())
.then(data => {
document.getElementById("footer-container").innerHTML = data;
});
</script>
</body>
</html>
